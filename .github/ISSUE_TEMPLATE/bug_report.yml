name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please only report issues from devices and processes you are authorized to test.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe what happened.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest reproducible steps.
      placeholder: |
        1. Open ...
        2. Select ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        Windows version:
        CaptureGuard version:
        Target process name:
        Target process bitness:
        Run as administrator:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Additional context
      description: Add screenshots, logs, or context. Do not include sensitive information.
