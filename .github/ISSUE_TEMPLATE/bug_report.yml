name: Bug report
description: 报告可复现的问题
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        请只报告你有权测试的设备和进程中的问题。
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要说明发生了什么。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请提供最小可复现步骤。
      placeholder: |
        1. 打开 ...
        2. 选择 ...
        3. 点击 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      placeholder: |
        Windows 版本：
        CaptureGuard 版本：
        目标进程名称：
        目标进程位数：
        是否管理员运行：
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 补充信息
      description: 可以粘贴截图、日志或其他上下文。请不要包含敏感信息。
