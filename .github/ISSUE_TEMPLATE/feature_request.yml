name: Feature request
description: Suggest an improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What real problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How do you expect it to work?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Responsible-use scope
      description: Confirm this is an authorized use case and does not involve bypassing monitoring, DRM, EDR, exams, or third-party protections.
    validations:
      required: true
